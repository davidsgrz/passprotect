# Rate limiting zones
limit_req_zone $binary_remote_addr zone=vw_login:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=vw_admin:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=vw_general:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=vw_conn:10m;

# Bloquear user agents maliciosos (herramientas de ataque)
map $http_user_agent $bad_ua {
    default 0;
    "~*sqlmap" 1;
    "~*nikto" 1;
    "~*nmap" 1;
    "~*masscan" 1;
    "~*zgrab" 1;
    "~*nessus" 1;
}

server {
    listen 80;
    server_name vault.*.nip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vault.*.nip.io;

    # TLS autofirmado
    ssl_certificate /etc/letsencrypt/live/selfsigned/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/selfsigned/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    include /etc/nginx/conf.d/security-headers.conf;

    # Bloquear user agents maliciosos
    if ($bad_ua) { return 403; }

    # Limites de request
    client_max_body_size 128M;
    client_body_timeout 60s;
    client_header_timeout 10s;
    limit_conn vw_conn 20;

    # Bloquear metodos HTTP no usados
    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$) {
        return 405;
    }

    # ModSecurity activado
    modsecurity on;
    modsecurity_rules_file /etc/nginx/modsec/modsecurity.conf;

    # Rate limit en login
    location /api/accounts/login {
        limit_req zone=vw_login burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://vaultwarden:80;
        include /etc/nginx/conf.d/proxy-params.conf;
    }

    # Rate limit estricto en admin
    location /admin {
        limit_req zone=vw_admin burst=3 nodelay;
        limit_req_status 429;

        # Whitelist IPs admin (configurar en produccion)
        # allow 1.2.3.4;
        # deny all;

        proxy_pass http://vaultwarden:80;
        include /etc/nginx/conf.d/proxy-params.conf;
    }

    # WebSocket para notificaciones en tiempo real
    location /notifications/hub {
        proxy_pass http://vaultwarden:3012;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # General
    location / {
        limit_req zone=vw_general burst=40 nodelay;
        proxy_pass http://vaultwarden:80;
        include /etc/nginx/conf.d/proxy-params.conf;
    }

    # Bloquear acceso a archivos sensibles
    location ~ /\. { deny all; }
    location ~ \.(env|git|svn|htaccess)$ { deny all; }
}
