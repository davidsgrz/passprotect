# Fail2ban filter — Intentos de SQL Injection detectados en logs
[Definition]
failregex = ^.*(?:UNION\s+SELECT|SLEEP\(|BENCHMARK\(|EXTRACTVALUE|UPDATEXML|information_schema|LOAD_FILE|INTO\s+OUTFILE).*\sIP:\s*<ADDR>.*$
            ^.*\[client <ADDR>\].*SQL Injection.*$
            ^.*ModSecurity:.*\[id "942.*"\].*\[client "<ADDR>"\].*$
ignoreregex =
