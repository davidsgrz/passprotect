# PassProtect — Stack completo de desarrollo
# Uso: docker compose -f proyectos/passprotect/docker-compose/docker-compose.yml up -d

services:
  # ── MariaDB para Vaultwarden ──
  mariadb-vw:
    image: dsegura97/mariadb-corp:1.0.0
    container_name: mariadb-vw
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_VW_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_VW_NAME}
      MYSQL_USER: ${DB_VW_USER}
      MYSQL_PASSWORD: ${DB_VW_PASSWORD}
    volumes:
      - mariadb-vw-data:/var/lib/mysql
    networks:
      - database
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - CHOWN
      - FOWNER
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── MariaDB para Keycloak ──
  mariadb-kc:
    image: dsegura97/mariadb-corp:1.0.0
    container_name: mariadb-kc
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_KC_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_KC_NAME}
      MYSQL_USER: ${DB_KC_USER}
      MYSQL_PASSWORD: ${DB_KC_PASSWORD}
    volumes:
      - mariadb-kc-data:/var/lib/mysql
    networks:
      - database
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - CHOWN
      - FOWNER
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Vaultwarden ──
  vaultwarden:
    image: dsegura97/vaultwarden-corp:1.0.0
    container_name: vaultwarden
    restart: unless-stopped
    depends_on:
      mariadb-vw:
        condition: service_healthy
    environment:
      DOMAIN: ${VW_DOMAIN}
      DATABASE_URL: "mysql://${DB_VW_USER}:${DB_VW_PASSWORD}@mariadb-vw/${DB_VW_NAME}"
      ADMIN_TOKEN: ${VW_ADMIN_TOKEN}
      SIGNUPS_ALLOWED: "false"
      INVITATIONS_ALLOWED: "true"
      SHOW_PASSWORD_HINT: "false"
      SSO_ENABLED: "true"
      SSO_CLIENT_ID: ${SSO_CLIENT_ID}
      SSO_CLIENT_SECRET: ${SSO_CLIENT_SECRET}
      SSO_AUTHORITY: ${SSO_AUTHORITY}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURITY: ${SMTP_SECURITY:-starttls}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    volumes:
      - vaultwarden-data:/data
    networks:
      - backend
      - database
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/alive"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Keycloak ──
  keycloak:
    image: dsegura97/keycloak-corp:1.0.0
    container_name: keycloak
    restart: unless-stopped
    depends_on:
      mariadb-kc:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_DB: mariadb
      KC_DB_URL: "jdbc:mariadb://mariadb-kc:3306/${DB_KC_NAME}"
      KC_DB_USERNAME: ${DB_KC_USER}
      KC_DB_PASSWORD: ${DB_KC_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_PROXY: edge
    volumes:
      - keycloak-data:/opt/keycloak/data
    networks:
      - backend
      - database
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── FreeIPA ──
  freeipa:
    image: freeipa/freeipa-server:fedora-40
    container_name: freeipa
    hostname: ipa.passprotect.local
    restart: unless-stopped
    environment:
      IPA_SERVER_HOSTNAME: ipa.passprotect.local
      IPA_SERVER_IP: "127.0.0.1"
    command: >
      ipa-server-install
      --unattended
      --realm=PASSPROTECT.LOCAL
      --domain=passprotect.local
      --ds-password=${IPA_DS_PASSWORD}
      --admin-password=${IPA_ADMIN_PASSWORD}
      --no-ntp
      --setup-dns
      --no-forwarders
    volumes:
      - freeipa-data:/data
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    read_only: false
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 0

  # ── Nginx Reverse Proxy ──
  nginx-proxy:
    image: dsegura97/nginx-proxy-corp:1.0.0
    container_name: nginx-proxy
    restart: unless-stopped
    depends_on:
      - vaultwarden
      - keycloak
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx-certs:/etc/letsencrypt
      - nginx-logs:/var/log/nginx
    networks:
      - frontend
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp

# ── Redes segmentadas ──
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: false
  database:
    driver: bridge
    internal: true

# ── Volumenes persistentes ──
volumes:
  vaultwarden-data:
  mariadb-vw-data:
  mariadb-kc-data:
  keycloak-data:
  freeipa-data:
  nginx-certs:
  nginx-logs:
