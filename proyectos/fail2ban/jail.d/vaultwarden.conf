# PassProtect — Fail2ban jails para Vaultwarden

# Jail 1: Login fallido (5 intentos → ban 1 hora)
[vaultwarden]
enabled = true
port = 80,443
filter = vaultwarden
logpath = /data/vaultwarden.log
maxretry = 5
bantime = 3600
findtime = 600
action = iptables-allports[name=vaultwarden, chain=FORWARD]

# Jail 2: Admin panel (3 intentos → ban 2 horas)
[vaultwarden-admin]
enabled = true
port = 80,443
filter = vaultwarden-admin
logpath = /data/vaultwarden.log
maxretry = 3
bantime = 7200
findtime = 600
action = iptables-allports[name=vaultwarden-admin, chain=FORWARD]

# Jail 3: SQL Injection attempts (1 intento → ban 24 horas)
[sqli-attempts]
enabled = true
port = 80,443,3306
filter = sqli-attempts
logpath = /var/log/mysql/general.log
          /var/log/modsec_audit.log
maxretry = 1
bantime = 86400
findtime = 86400
action = iptables-allports[name=sqli, chain=FORWARD]
