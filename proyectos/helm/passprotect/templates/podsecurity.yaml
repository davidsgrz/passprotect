# Pod Security Standards (PSS) — sustituyen a las antiguas PodSecurityPolicies (deprecated en 1.25).
# Modelo: enforce dicta lo permitido, audit/warn registran o avisan sin bloquear.
# Mantenemos enforce en el nivel del values.yaml pero audit+warn=restricted siempre,
# para detectar pods que NO cumplen restricted aunque baseline los acepte (defensa preventiva
# antes de subir el enforce a restricted).
{{- if .Values.security.podSecurityStandards }}
# Las labels pod-security.kubernetes.io/* aplicadas al Namespace activan PSS.
# Tres niveles disponibles: privileged (sin restricciones), baseline (sin caps
# peligrosas, sin hostPath), restricted (todo lo de baseline + runAsNonRoot,
# readOnlyRootFilesystem, drop ALL caps, seccompProfile)
apiVersion: v1
kind: Namespace
metadata:
  name: vaultwarden
  labels:
    pod-security.kubernetes.io/enforce: {{ .Values.security.podSecurityStandards.vaultwarden }}
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: auth
  labels:
    pod-security.kubernetes.io/enforce: {{ .Values.security.podSecurityStandards.auth }}
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    pod-security.kubernetes.io/enforce: {{ .Values.security.podSecurityStandards.monitoring }}
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
{{- end }}
