{{- if .Values.security.networkPolicies.enabled }}
# Modelo: default-deny-all en cada namespace + allows explicitos por flujo.
# podSelector: {} matchea TODOS los pods del namespace.
# Sin allows posteriores, ningun pod puede recibir/emitir trafico (ni siquiera DNS).
# Cada allow-* abre un flujo concreto con minimo privilegio.
# Deny-all en vaultwarden
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: vaultwarden
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# Abre la entrada al pod vaultwarden SOLO desde pods del namespace "ingress"
# (donde corre nginx-ingress de MicroK8s). Los puertos abiertos son 8080 (HTTP
# de la app) y 3012 (WebSocket para sync push). Cualquier otro origen rebota
# contra el default-deny-all
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-vaultwarden
  namespace: vaultwarden
spec:
  podSelector:
    matchLabels:
      app: vaultwarden
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
      ports:
        - port: 8080  # vaultwarden bind unprivileged tras 'su' droppea NET_BIND_SERVICE
        - port: 3012
---
# Postgres-vw: SOLO acepta conexiones del pod vaultwarden (mismo namespace).
# El podSelector matchea por label, no por nombre de pod, asi que sigue
# funcionando aunque el pod se reemplace. Otros pods en el ns vaultwarden
# (ej: si un dia metemos algo de monitoring aqui) NO podrian leer la BD
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vw-to-postgres
  namespace: vaultwarden
spec:
  podSelector:
    matchLabels:
      app: postgres-vw
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: vaultwarden
      ports:
        - port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vw-egress
  namespace: vaultwarden
spec:
  podSelector:
    matchLabels:
      app: vaultwarden
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres-vw
      ports:
        - port: 5432
    # DNS al CoreDNS de kube-system: necesario porque el deny-all bloquea
    # incluso el 53/udp, sin esto fallan TODOS los lookups (postgres, keycloak)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auth
      ports:
        - port: 8080
    # Egress HTTPS al ingress externo (necesario para SSO discovery contra
    # https://auth.passprotect.es desde el binario Timshel — el flow OIDC
    # contacta al issuer público para descargar el discovery doc + JWKS).
    # El tráfico hace hairpin: pod -> nodo -> ingress -> Keycloak.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
---
# Deny-all en auth
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: auth
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-keycloak
  namespace: auth
spec:
  podSelector:
    matchLabels:
      app: keycloak
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
      ports:
        - port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vaultwarden
      ports:
        - port: 8080
---
# Egress de Keycloak: 3 destinos permitidos.
#  1) postgres-kc:5432 para almacenar realms/usuarios/sesiones
#  2) openldap:389 (LDAP plano) y :636 (LDAPS) para LDAP federation
#  3) DNS al CoreDNS de kube-system (53/udp+tcp)
# Cualquier otro destino (internet, otros namespaces) queda bloqueado por deny-all
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kc-egress
  namespace: auth
spec:
  podSelector:
    matchLabels:
      app: keycloak
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres-kc
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: openldap
      ports:
        - port: 389
        - port: 636
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Ingress a postgres-kc desde keycloak (counterpart de allow-kc-egress)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-kc-ingress
  namespace: auth
spec:
  podSelector:
    matchLabels:
      app: postgres-kc
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: keycloak
      ports:
        - port: 5432
---
# Ingress a openldap desde keycloak (counterpart de allow-kc-egress)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-openldap-ingress
  namespace: auth
spec:
  podSelector:
    matchLabels:
      app: openldap
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: keycloak
      ports:
        - port: 389
        - port: 636
---
# Egress de postgres-kc para DNS (resolver el upstream del statefulset)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-kc-egress
  namespace: auth
spec:
  podSelector:
    matchLabels:
      app: postgres-kc
  policyTypes: [Egress]
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Egress de openldap para DNS y operaciones internas
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-openldap-egress
  namespace: auth
spec:
  podSelector:
    matchLabels:
      app: openldap
  policyTypes: [Egress]
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Egress de postgres-vw para DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-vw-egress
  namespace: vaultwarden
spec:
  podSelector:
    matchLabels:
      app: postgres-vw
  policyTypes: [Egress]
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- if .Values.certManager.enabled }}
---
# Permitir ingress de nginx-ingress al pod solver de cert-manager (HTTP-01).
# Sin esto, default-deny-all de los namespaces bloquea el self-check del
# challenge -> emisión cuelga con "context deadline exceeded".
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-acme-solver
  namespace: vaultwarden
spec:
  podSelector:
    matchLabels:
      acme.cert-manager.io/http01-solver: "true"
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
      ports:
        - port: 8089
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-acme-solver
  namespace: auth
spec:
  podSelector:
    matchLabels:
      acme.cert-manager.io/http01-solver: "true"
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
      ports:
        - port: 8089
{{- end }}
{{- end }}
