{{- if .Values.security.networkPolicies.enabled }}
# Deny-all en vaultwarden
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: vaultwarden
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-vaultwarden
  namespace: vaultwarden
spec:
  podSelector:
    matchLabels:
      app: vaultwarden
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
      ports:
        - port: 8080  # vaultwarden bind unprivileged tras 'su' droppea NET_BIND_SERVICE
        - port: 3012
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vw-to-postgres
  namespace: vaultwarden
spec:
  podSelector:
    matchLabels:
      app: postgres-vw
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: vaultwarden
      ports:
        - port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vw-egress
  namespace: vaultwarden
spec:
  podSelector:
    matchLabels:
      app: vaultwarden
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres-vw
      ports:
        - port: 5432
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auth
      ports:
        - port: 8080
    # Egress HTTPS al ingress externo (necesario para SSO discovery contra
    # https://auth.passprotect.es desde el binario Timshel — el flow OIDC
    # contacta al issuer público para descargar el discovery doc + JWKS).
    # El tráfico hace hairpin: pod -> nodo -> ingress -> Keycloak.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
---
# Deny-all en auth
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: auth
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-keycloak
  namespace: auth
spec:
  podSelector:
    matchLabels:
      app: keycloak
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
      ports:
        - port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vaultwarden
      ports:
        - port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kc-egress
  namespace: auth
spec:
  podSelector:
    matchLabels:
      app: keycloak
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres-kc
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: openldap
      ports:
        - port: 389
        - port: 636
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Ingress a postgres-kc desde keycloak (counterpart de allow-kc-egress)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-kc-ingress
  namespace: auth
spec:
  podSelector:
    matchLabels:
      app: postgres-kc
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: keycloak
      ports:
        - port: 5432
---
# Ingress a openldap desde keycloak (counterpart de allow-kc-egress)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-openldap-ingress
  namespace: auth
spec:
  podSelector:
    matchLabels:
      app: openldap
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: keycloak
      ports:
        - port: 389
        - port: 636
---
# Egress de postgres-kc para DNS (resolver el upstream del statefulset)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-kc-egress
  namespace: auth
spec:
  podSelector:
    matchLabels:
      app: postgres-kc
  policyTypes: [Egress]
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Egress de openldap para DNS y operaciones internas
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-openldap-egress
  namespace: auth
spec:
  podSelector:
    matchLabels:
      app: openldap
  policyTypes: [Egress]
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Egress de postgres-vw para DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-vw-egress
  namespace: vaultwarden
spec:
  podSelector:
    matchLabels:
      app: postgres-vw
  policyTypes: [Egress]
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- if .Values.certManager.enabled }}
---
# Permitir ingress de nginx-ingress al pod solver de cert-manager (HTTP-01).
# Sin esto, default-deny-all de los namespaces bloquea el self-check del
# challenge -> emisión cuelga con "context deadline exceeded".
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-acme-solver
  namespace: vaultwarden
spec:
  podSelector:
    matchLabels:
      acme.cert-manager.io/http01-solver: "true"
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
      ports:
        - port: 8089
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-acme-solver
  namespace: auth
spec:
  podSelector:
    matchLabels:
      acme.cert-manager.io/http01-solver: "true"
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
      ports:
        - port: 8089
{{- end }}
{{- end }}
