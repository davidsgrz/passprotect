# PriorityClasses — el scheduler da prioridad a BD y servicios criticos
# Si hay presion de recursos, los pods de menor prioridad se expulsan primero
#
# Como funciona: cuando un nodo se queda sin RAM/CPU, kubelet ejecuta el "node
# pressure eviction" y mata pods. Sin PriorityClass, va por orden arbitrario.
# Con PriorityClass, los pods con value mas bajo se desalojan ANTES.
# Las BD aqui tienen valor alto (1M) y los workloads value normal (100K) -> si
# hay OOM, mueren primero los pods de aplicacion, no Postgres ni OpenLDAP

# Bases de datos y OpenLDAP — maxima prioridad (no se desalojan nunca)
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: db-priority
# globalDefault: false = solo se aplica a pods que la referencien explicitamente
# (con priorityClassName: db-priority en el spec)
value: 1000000
globalDefault: false
description: "Prioridad maxima para bases de datos y OpenLDAP — nunca desalojados"
---
# Servicios de aplicacion — alta prioridad
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: high-priority
value: 100000
globalDefault: false
description: "Alta prioridad para Vaultwarden, Keycloak y Dashboard"
