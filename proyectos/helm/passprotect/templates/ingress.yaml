{{- if .Values.ingress.enabled }}
{{- $sslRedirect := ternary "false" "true" .Values.certManager.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vaultwarden-ingress
  namespace: vaultwarden
  labels:
    {{- include "passprotect.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: {{ $sslRedirect | quote }}
    nginx.ingress.kubernetes.io/proxy-body-size: "128m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/limit-rps: "20"
    # Buffers ampliados: Vaultwarden + Keycloak SSO meten cookies grandes y
    # algunas respuestas (login, callback OIDC) exceden el default 4k -> 502.
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
    {{- if .Values.certManager.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.certManager.issuer | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ include "passprotect.vwDomain" . }}
      secretName: vaultwarden-tls
  {{- end }}
  rules:
    - host: {{ include "passprotect.vwDomain" . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vaultwarden
                port:
                  number: 80
          - path: /notifications/hub
            pathType: Prefix
            backend:
              service:
                name: vaultwarden
                port:
                  number: 3012
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak-ingress
  namespace: auth
  labels:
    {{- include "passprotect.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: {{ $sslRedirect | quote }}
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # Buffers ampliados (igual que vault): Keycloak emite headers grandes
    # con cookies de sesión, exceden default 4k -> 502 upstream too big.
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
    {{- if .Values.certManager.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.certManager.issuer | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ include "passprotect.keycloakHost" . }}
      secretName: keycloak-tls
  {{- end }}
  rules:
    - host: {{ include "passprotect.keycloakHost" . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dashboard-ingress
  namespace: monitoring
  labels:
    {{- include "passprotect.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: {{ $sslRedirect | quote }}
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # Buffers ampliados: dashboard via oauth2-proxy mantiene cookies de sesión
    # OIDC que exceden default 4k -> 502.
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
    {{- if .Values.certManager.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.certManager.issuer | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ include "passprotect.dashboardDomain" . }}
      secretName: dashboard-tls
  {{- end }}
  rules:
    - host: {{ include "passprotect.dashboardDomain" . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                {{- if .Values.dashboard.oauth2Proxy.enabled }}
                # Tráfico pasa por oauth2-proxy:4180 → si auth OK, upstream a dashboard:3000
                name: dashboard-oauth2-proxy
                port:
                  number: 4180
                {{- else }}
                name: dashboard
                port:
                  number: 3000
                {{- end }}
{{- end }}
