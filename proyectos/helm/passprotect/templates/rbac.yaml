# automountServiceAccountToken=false en TODAS las SAs: vaultwarden/keycloak/openldap
# no necesitan llamar a la API de Kubernetes. Sin esto, K8s monta el JWT en
# /var/run/secrets/kubernetes.io/serviceaccount/token y un attacker dentro del pod
# podria llamar a la API. Reduce la superficie de ataque post-compromiso.
# monitoring-sa SI necesita la API (lee pods/logs) -> Role + RoleBinding mas abajo.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vaultwarden-sa
  namespace: vaultwarden
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-sa
  namespace: auth
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitoring-sa
  namespace: monitoring
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: monitoring-reader
  namespace: vaultwarden
# Solo get+list, NO watch ni create. El dashboard / cronjobs solo necesitan leer estado puntual
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: monitoring-reader
  namespace: auth
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints"]
    verbs: ["get", "list"]
---
# RoleBinding: enlaza una ServiceAccount con un Role.
# Aqui damos a la SA "monitoring-sa" (que vive en namespace monitoring) los
# permisos del Role "monitoring-reader" pero EN EL NAMESPACE vaultwarden.
# Asi monitoring puede leer pods/logs de vaultwarden sin ser admin de ese ns
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: monitoring-read-vw
  namespace: vaultwarden
subjects:
  - kind: ServiceAccount
    name: monitoring-sa
    namespace: monitoring
roleRef:
  kind: Role
  name: monitoring-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: monitoring-read-auth
  namespace: auth
subjects:
  - kind: ServiceAccount
    name: monitoring-sa
    namespace: monitoring
roleRef:
  kind: Role
  name: monitoring-reader
  apiGroup: rbac.authorization.k8s.io
