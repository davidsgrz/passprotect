apiVersion: v1
kind: Secret
metadata:
  name: vaultwarden-secrets
  namespace: vaultwarden
  labels:
    {{- include "passprotect.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-token: {{ required "vaultwarden admin token requerido" .Values.vaultwarden.adminToken | quote }}
  db-password: {{ required "postgres-vw password requerido" .Values.postgresVw.password | quote }}
  sso-client-secret: {{ required "SSO client secret requerido" .Values.vaultwarden.sso.clientSecret | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secrets
  namespace: auth
  labels:
    {{- include "passprotect.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-password: {{ required "keycloak admin password requerido" .Values.keycloak.adminPassword | quote }}
  db-password: {{ required "postgres-kc password requerido" .Values.postgresKc.password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: openldap-secrets
  namespace: auth
  labels:
    {{- include "passprotect.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-password: {{ required "OpenLDAP admin password requerido" .Values.openldap.adminPassword | quote }}
  config-password: {{ required "OpenLDAP config password requerido" .Values.openldap.configPassword | quote }}
{{- if .Values.dashboard.oauth2Proxy.enabled }}
---
# Secret usado por oauth2-proxy delante del dashboard:
# - client-id / client-secret: cliente OIDC "dashboard" en Keycloak (creado via
#   configure-keycloak.sh).
# - cookie-secret: clave AES (16/24/32 bytes) para cifrar la cookie de sesión.
apiVersion: v1
kind: Secret
metadata:
  name: dashboard-oauth2-proxy-secrets
  namespace: monitoring
  labels:
    {{- include "passprotect.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-id: {{ .Values.dashboard.oauth2Proxy.clientId | default "dashboard" | quote }}
  client-secret: {{ required "dashboard oauth2-proxy client secret requerido" .Values.dashboard.oauth2Proxy.clientSecret | quote }}
  cookie-secret: {{ required "dashboard oauth2-proxy cookie secret requerido (32 bytes para AES-256)" .Values.dashboard.oauth2Proxy.cookieSecret | quote }}
{{- end }}
