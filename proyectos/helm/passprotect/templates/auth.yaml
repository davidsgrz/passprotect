apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: auth
  labels:
    app: keycloak
    {{- include "passprotect.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.keycloak.replicas }}
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      securityContext:
        {{- include "passprotect.podSecurityContext" . | nindent 8 }}
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy }}
          args: ["start-dev"]
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9000
              name: metrics
          env:
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.adminUser | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: admin-password
            - name: KC_DB
              value: {{ .Values.keycloak.db.vendor | quote }}
            - name: KC_DB_URL
              value: "jdbc:mariadb://mariadb-kc:3306/{{ .Values.keycloak.db.database }}"
            - name: KC_DB_USERNAME
              value: {{ .Values.keycloak.db.user | quote }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: db-password
            - name: KC_HOSTNAME
              value: {{ .Values.keycloak.hostname | quote }}
            - name: KC_PROXY
              value: "edge"
          securityContext:
            {{- include "passprotect.containerSecurityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /opt/keycloak/logs
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: auth
  labels:
    {{- include "passprotect.labels" . | nindent 4 }}
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb-kc
  namespace: auth
  labels:
    app: mariadb-kc
    {{- include "passprotect.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb-kc
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mariadb-kc
    spec:
      containers:
        - name: mariadb
          image: "{{ .Values.mariadbKc.image.repository }}:{{ .Values.mariadbKc.image.tag }}"
          imagePullPolicy: {{ .Values.mariadbKc.image.pullPolicy }}
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: db-root-password
            - name: MYSQL_DATABASE
              value: {{ .Values.mariadbKc.database | quote }}
            - name: MYSQL_USER
              value: {{ .Values.mariadbKc.user | quote }}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: db-password
          resources:
            {{- toYaml .Values.mariadbKc.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: logs
              mountPath: /var/log/mysql
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mariadb-kc
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb-kc
  namespace: auth
  labels:
    {{- include "passprotect.labels" . | nindent 4 }}
spec:
  selector:
    app: mariadb-kc
  ports:
    - port: 3306
      targetPort: 3306
