apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: auth
  labels:
    app: keycloak
    {{- include "passprotect.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.keycloak.replicas }}
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      securityContext:
        {{- include "passprotect.podSecurityContext" . | nindent 8 }}
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy }}
          args: ["start", "--optimized"]
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9000
              name: metrics
          env:
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.adminUser | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: admin-password
            - name: KC_DB
              value: {{ .Values.keycloak.db.vendor | quote }}
            - name: KC_DB_URL
              value: "jdbc:postgresql://postgres-kc:5432/{{ .Values.keycloak.db.database }}"
            - name: KC_DB_USERNAME
              value: {{ .Values.keycloak.db.user | quote }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: db-password
            - name: KC_HOSTNAME
              value: {{ include "passprotect.keycloakHost" . | quote }}
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HTTP_ENABLED
              value: "true"
          securityContext:
            {{- include "passprotect.containerSecurityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /opt/keycloak/logs
            - name: kc-data
              mountPath: /opt/keycloak/data
          startupProbe:
            httpGet:
              path: /health/started
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 50Mi
        - name: logs
          emptyDir:
            sizeLimit: 100Mi
        - name: kc-data
          emptyDir:
            sizeLimit: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: auth
  labels:
    {{- include "passprotect.labels" . | nindent 4 }}
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9000
      targetPort: 9000
---
# ── PostgreSQL Keycloak — StatefulSet (sustituye a mariadb-kc) ──
# Imagen alpine (~80 MB), ~100 MB RAM en reposo. BD oficial de referencia para Keycloak.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-kc
  namespace: auth
  labels:
    app: postgres-kc
    {{- include "passprotect.labels" . | nindent 4 }}
spec:
  serviceName: postgres-kc
  replicas: 1
  selector:
    matchLabels:
      app: postgres-kc
  template:
    metadata:
      labels:
        app: postgres-kc
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: "{{ .Values.postgresKc.image.repository }}:{{ .Values.postgresKc.image.tag }}"
          imagePullPolicy: {{ .Values.postgresKc.image.pullPolicy }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresKc.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresKc.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            {{- toYaml .Values.postgresKc.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.postgresKc.user }}", "-d", "{{ .Values.postgresKc.database }}"]
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.postgresKc.user }}", "-d", "{{ .Values.postgresKc.database }}"]
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 2
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.postgresKc.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-kc
  namespace: auth
  labels:
    {{- include "passprotect.labels" . | nindent 4 }}
spec:
  selector:
    app: postgres-kc
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
