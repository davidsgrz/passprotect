apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: vaultwarden
  labels:
    app: vaultwarden
    {{- include "passprotect.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.vaultwarden.replicas }}
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      labels:
        app: vaultwarden
    spec:
      securityContext:
        # vaultwarden-corp:1.0.0 entrypoint /root/admin/vaultwarden/start.sh hace `su vaultwarden`
        # al final, así que el container DEBE arrancar como root. El binario real corre como user
        # vaultwarden (UID asignado por useradd -r en el Dockerfile).
        # Bumpear a 1.0.1 con permisos arreglados queda para otra sesión.
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vaultwarden
          image: "{{ .Values.vaultwarden.image.repository }}:{{ .Values.vaultwarden.image.tag }}"
          imagePullPolicy: {{ .Values.vaultwarden.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
            - containerPort: 3012
              name: websocket
          env:
            - name: DOMAIN
              value: {{ .Values.vaultwarden.domain | quote }}
            - name: SIGNUPS_ALLOWED
              value: {{ .Values.vaultwarden.signupsAllowed | quote }}
            - name: INVITATIONS_ALLOWED
              value: {{ .Values.vaultwarden.invitationsAllowed | quote }}
            - name: SHOW_PASSWORD_HINT
              value: {{ .Values.vaultwarden.showPasswordHint | quote }}
            - name: SSO_ENABLED
              value: {{ .Values.vaultwarden.sso.enabled | quote }}
            - name: SSO_CLIENT_ID
              value: {{ .Values.vaultwarden.sso.clientId | quote }}
            - name: SSO_AUTHORITY
              value: {{ .Values.vaultwarden.sso.authority | quote }}
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: admin-token
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: db-password
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresVw.user }}:$(DB_PASSWORD)@postgres-vw:5432/{{ .Values.postgresVw.database }}"
            - name: SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: sso-client-secret
          securityContext:
            # No usamos readOnlyRootFilesystem porque el wrapper escribe a /root/logs
            # y porque el wrapper hace mkdir en runtime. Caps mínimas + drop ALL.
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              add: [CHOWN, DAC_OVERRIDE, SETUID, SETGID, NET_BIND_SERVICE]
          resources:
            {{- toYaml .Values.vaultwarden.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /root/logs
          livenessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultwarden-data
        - name: tmp
          emptyDir:
            sizeLimit: 50Mi
        - name: logs
          emptyDir:
            sizeLimit: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  name: vaultwarden
  namespace: vaultwarden
  labels:
    {{- include "passprotect.labels" . | nindent 4 }}
spec:
  selector:
    app: vaultwarden
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: websocket
      port: 3012
      targetPort: 3012
---
# ── PostgreSQL Vaultwarden — StatefulSet (sustituye a mariadb-vw) ──
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-vw
  namespace: vaultwarden
  labels:
    app: postgres-vw
    {{- include "passprotect.labels" . | nindent 4 }}
spec:
  serviceName: postgres-vw
  replicas: 1
  selector:
    matchLabels:
      app: postgres-vw
  template:
    metadata:
      labels:
        app: postgres-vw
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: "{{ .Values.postgresVw.image.repository }}:{{ .Values.postgresVw.image.tag }}"
          imagePullPolicy: {{ .Values.postgresVw.image.pullPolicy }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresVw.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresVw.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            {{- toYaml .Values.postgresVw.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.postgresVw.user }}", "-d", "{{ .Values.postgresVw.database }}"]
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.postgresVw.user }}", "-d", "{{ .Values.postgresVw.database }}"]
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 2
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.postgresVw.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-vw
  namespace: vaultwarden
  labels:
    {{- include "passprotect.labels" . | nindent 4 }}
spec:
  selector:
    app: postgres-vw
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
