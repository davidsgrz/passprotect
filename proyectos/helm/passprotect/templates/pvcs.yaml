# PVCs "huerfanos" (no creados via volumeClaimTemplates):
#  - vaultwarden-data: app stateful pero corre en Deployment (no StatefulSet) porque
#    1 sola replica + Recreate basta y simplifica la rotacion del pod
#  - openldap-data/-config: idem
#  - backup-storage: usado por el CronJob de backup
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vaultwarden-data
  namespace: vaultwarden
  labels:
    {{- include "passprotect.labels" . | nindent 4 }}
# accessModes ReadWriteOnce: el volumen lo monta UN solo nodo a la vez.
# Es el modo soportado por hostpath storage de MicroK8s. Suficiente porque tenemos
# 1 sola replica de cada componente. Para multi-pod necesitariamos ReadWriteMany (NFS/Ceph)
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.vaultwarden.persistence.size }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openldap-data
  namespace: auth
  labels:
    {{- include "passprotect.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.openldap.persistence.data.size }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openldap-config
  namespace: auth
  labels:
    {{- include "passprotect.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.openldap.persistence.config.size }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-storage
  namespace: monitoring
  labels:
    {{- include "passprotect.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.monitoring.backup.persistence.size }}
# Nota: los PVCs de postgres-kc y postgres-vw se crean via volumeClaimTemplates
# de sus respectivos StatefulSets (patron idiomatico de K8s para DBs).
