# PassProtect — Valores por defecto del Helm Chart
# Sobreescribir con values-prod.yaml para produccion

global:
  vpsIp: "TU_IP_VPS"
  imageRegistry: "dsegura97"

# ── Vaultwarden ──
vaultwarden:
  image:
    repository: dsegura97/vaultwarden-corp
    tag: "1.0.4"
    pullPolicy: IfNotPresent
  replicas: 1
  host: "vault.passprotect.es"
  domain: "https://vault.passprotect.es"
  signupsAllowed: "false"
  invitationsAllowed: "true"
  showPasswordHint: "false"
  sso:
    enabled: "true"
    clientId: "vaultwarden"
    authority: "https://auth.passprotect.es/realms/corporativo"
  smtp:
    host: ""
    from: ""
    port: "587"
    security: "starttls"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    size: 5Gi

# ── PostgreSQL Vaultwarden ──
postgresVw:
  image:
    repository: dsegura97/postgres-corp
    tag: "1.0.1"
    pullPolicy: IfNotPresent
  database: "vaultwarden"
  user: "vaultwarden"
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    size: 10Gi

# ── Keycloak ──
keycloak:
  image:
    repository: dsegura97/keycloak-corp
    tag: "1.0.1"
    pullPolicy: IfNotPresent
  replicas: 1
  host: "auth.passprotect.es"
  hostname: "auth.passprotect.es"
  adminUser: "admin"
  db:
    vendor: "postgres"
    database: "keycloak"
    user: "keycloak"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1280Mi

# ── PostgreSQL Keycloak ──
postgresKc:
  image:
    repository: dsegura97/postgres-corp
    tag: "1.0.1"
    pullPolicy: IfNotPresent
  database: "keycloak"
  user: "keycloak"
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    size: 5Gi

# ── OpenLDAP ──
# Sustituye a FreeIPA. Ver docs/ARCHITECTURE.md (seccion "Identidad")
# para la justificacion de la migracion.
openldap:
  image:
    repository: dsegura97/openldap-corp
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  replicas: 1
  organization: "PassProtect Corp"
  domain: "corp.local"
  baseDn: "dc=corp,dc=local"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    data:
      size: 2Gi
    config:
      size: 512Mi

# ── Dashboard ──
dashboard:
  image:
    repository: dsegura97/dashboard-corp
    tag: "1.0.3"
    pullPolicy: IfNotPresent
  replicas: 1
  host: "dashboard.passprotect.es"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  # ── oauth2-proxy delante del dashboard (SSO via Keycloak) ──
  # Si enabled=true, el ingress dashboard-ingress apunta a oauth2-proxy:4180
  # en lugar de dashboard:3000 directamente. oauth2-proxy valida sesión OIDC
  # contra Keycloak antes de exponer el contenido (patrón Reverse Proxy Auth).
  oauth2Proxy:
    enabled: true
    image:
      repository: quay.io/oauth2-proxy/oauth2-proxy
      tag: "v7.6.0"
      pullPolicy: IfNotPresent
    clientId: "dashboard"
    issuerUrl: "https://auth.passprotect.es/realms/corporativo"
    # clientSecret y cookieSecret se generan en deploy.sh desde config.env
    # (DASHBOARD_SSO_CLIENT_SECRET y DASHBOARD_OAUTH2_COOKIE_SECRET)

# ── Ingress ──
ingress:
  enabled: true
  className: "nginx"
  tls:
    enabled: true

# ── cert-manager (Let's Encrypt) ──
# Si enabled=true, cada Ingress añade la annotation cert-manager.io/cluster-issuer
# para emisión automática + renovación de certs LE.
# IMPORTANTE: con cert-manager habilitado, los Ingresses usan ssl-redirect=false
# para no romper el HTTP-01 challenge (que requiere HTTP plano en /.well-known/).
certManager:
  enabled: true
  issuer: "letsencrypt-prod"  # alternativa: "letsencrypt-staging" para testing

# ── Monitoring ──
monitoring:
  audit:
    schedule: "0 */6 * * *"
  backup:
    schedule: "0 3 * * *"
    retentionDays: 30
    persistence:
      size: 20Gi

# ── Security ──
security:
  podSecurityStandards:
    vaultwarden: "baseline"
    auth: "baseline"
    monitoring: "baseline"
  networkPolicies:
    enabled: true
  resourceQuotas:
    enabled: true
