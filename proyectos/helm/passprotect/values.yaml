# PassProtect — Valores por defecto del Helm Chart
# Sobreescribir con values-prod.yaml para produccion

global:
  vpsIp: "TU_IP_VPS"
  imageRegistry: "dsegura97"

# ── Vaultwarden ──
vaultwarden:
  image:
    repository: dsegura97/vaultwarden-corp
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  replicas: 1
  domain: "https://vault.passprotect.es"
  signupsAllowed: "false"
  invitationsAllowed: "true"
  showPasswordHint: "false"
  sso:
    enabled: "true"
    clientId: "vaultwarden"
    authority: "https://auth.passprotect.es/realms/corporativo"
  smtp:
    host: ""
    from: ""
    port: "587"
    security: "starttls"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    size: 5Gi

# ── PostgreSQL Vaultwarden ──
postgresVw:
  image:
    repository: dsegura97/postgres-corp
    tag: "1.0.1"
    pullPolicy: IfNotPresent
  database: "vaultwarden"
  user: "vaultwarden"
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    size: 10Gi

# ── Keycloak ──
keycloak:
  image:
    repository: dsegura97/keycloak-corp
    tag: "1.0.1"
    pullPolicy: IfNotPresent
  replicas: 1
  host: "auth.passprotect.es"
  hostname: "auth.passprotect.es"
  adminUser: "admin"
  db:
    vendor: "postgres"
    database: "keycloak"
    user: "keycloak"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1280Mi

# ── PostgreSQL Keycloak ──
postgresKc:
  image:
    repository: dsegura97/postgres-corp
    tag: "1.0.1"
    pullPolicy: IfNotPresent
  database: "keycloak"
  user: "keycloak"
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    size: 5Gi

# ── OpenLDAP ──
# Sustituye a FreeIPA. Ver docs/ARCHITECTURE.md (seccion "Identidad")
# para la justificacion de la migracion.
openldap:
  image:
    repository: dsegura97/openldap-corp
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  replicas: 1
  organization: "PassProtect Corp"
  domain: "corp.local"
  baseDn: "dc=corp,dc=local"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    data:
      size: 2Gi
    config:
      size: 512Mi

# ── Dashboard ──
dashboard:
  image:
    repository: dsegura97/dashboard-corp
    tag: "1.0.2"
    pullPolicy: IfNotPresent
  replicas: 1
  host: "dashboard.passprotect.es"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# ── Ingress ──
ingress:
  enabled: true
  className: "nginx"
  tls:
    enabled: true

# ── Monitoring ──
monitoring:
  audit:
    schedule: "0 */6 * * *"
  backup:
    schedule: "0 3 * * *"
    retentionDays: 30
    persistence:
      size: 20Gi

# ── Security ──
security:
  podSecurityStandards:
    vaultwarden: "baseline"
    auth: "baseline"
    monitoring: "baseline"
  networkPolicies:
    enabled: true
  resourceQuotas:
    enabled: true
