    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "auth.passprotect.es"
      secretName: keycloak-tls
  rules:
    - host: "auth.passprotect.es"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
