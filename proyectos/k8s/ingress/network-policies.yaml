# Deny-all por defecto en vaultwarden namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: vaultwarden
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Permitir trafico de Ingress a Vaultwarden
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-vaultwarden
  namespace: vaultwarden
spec:
  podSelector:
    matchLabels:
      app: vaultwarden
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
      ports:
        - port: 80
        - port: 3012
---
# Permitir Vaultwarden -> PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vw-to-postgres
  namespace: vaultwarden
spec:
  podSelector:
    matchLabels:
      app: postgres-vw
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: vaultwarden
      ports:
        - port: 5432
---
# Permitir egress de Vaultwarden a PostgreSQL y DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vw-egress
  namespace: vaultwarden
spec:
  podSelector:
    matchLabels:
      app: vaultwarden
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres-vw
      ports:
        - port: 5432
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Egress a auth namespace para SSO
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auth
      ports:
        - port: 8080
---
# Deny-all por defecto en auth namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: auth
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Permitir trafico Ingress a Keycloak
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-keycloak
  namespace: auth
spec:
  podSelector:
    matchLabels:
      app: keycloak
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
      ports:
        - port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vaultwarden
      ports:
        - port: 8080
---
# Permitir Keycloak -> PostgreSQL-KC y OpenLDAP
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kc-egress
  namespace: auth
spec:
  podSelector:
    matchLabels:
      app: keycloak
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres-kc
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: openldap
      ports:
        - port: 389
        - port: 636
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
