# Auditoria de seguridad cada 6 horas
apiVersion: batch/v1
kind: CronJob
metadata:
  name: security-audit
  namespace: monitoring
spec:
  schedule: "0 */6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: audit
              image: dsegura97/ubseguridadd:latest
              command:
                - /bin/bash
                - -c
                - |
                  echo "=== Auditoria PassProtect $(date) ==="
                  echo "--- Logs de seguridad ---"
                  cat /root/logs/security_audit.log 2>/dev/null | tail -100
                  echo "=== Fin auditoria ==="
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: [ALL]
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
          restartPolicy: OnFailure
---
# Backup diario a las 3 AM
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vaultwarden-backup
  namespace: monitoring
spec:
  schedule: "0 3 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            fsGroup: 70
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: dsegura97/postgres-corp:1.0.0
              command:
                - /bin/sh
                - -c
                - |
                  BACKUP_FILE="/backup/vaultwarden-$(date +%Y%m%d-%H%M%S).sql.gz"
                  echo "[$(date)] Iniciando backup..."
                  pg_dump -h postgres-vw.vaultwarden.svc.cluster.local \
                    -U "${POSTGRES_USER}" \
                    -d "${POSTGRES_DB}" \
                    --no-owner --no-privileges | gzip > "$BACKUP_FILE"
                  echo "[$(date)] Backup completado: $BACKUP_FILE"
                  find /backup -name "*.sql.gz" -mtime +30 -delete
                  echo "[$(date)] Limpieza de backups antiguos completada"
              env:
                - name: POSTGRES_USER
                  value: "vaultwarden"
                - name: POSTGRES_DB
                  value: "vaultwarden"
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: vaultwarden-secrets
                      key: db-password
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: backup
                  mountPath: /backup
          restartPolicy: OnFailure
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: backup-storage
