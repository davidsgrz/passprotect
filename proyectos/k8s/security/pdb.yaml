# PodDisruptionBudgets — single-node friendly (VPS 1 nodo).
# maxUnavailable: 1 permite mantenimiento sin bloquear rolling updates
# cuando solo hay 1 replica por servicio.
# En single-node, minAvailable:1 bloquearia drain/upgrade.

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vaultwarden-pdb
  namespace: vaultwarden
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: vaultwarden
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: keycloak-pdb
  namespace: auth
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: keycloak
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dashboard-pdb
  namespace: monitoring
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: dashboard
