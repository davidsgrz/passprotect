# ── Keycloak — 2 replicas (sin estado) ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: auth
  labels:
    app: keycloak
spec:
  replicas: 2
  selector:
    matchLabels:
      app: keycloak
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      priorityClassName: high-priority
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: keycloak
          image: dsegura97/keycloak-corp:1.0.0
          args: ["start-dev"]
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9000
              name: metrics
          envFrom:
            - configMapRef:
                name: keycloak-config
          env:
            - name: KEYCLOAK_ADMIN
              value: "admin"
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: admin-password
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: db-password
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1536Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /root/logs
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 2
            timeoutSeconds: 3
      volumes:
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: auth
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9000
      targetPort: 9000
---
# ── MariaDB Keycloak — StatefulSet (1 replica, reinicio rapido) ──
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb-kc
  namespace: auth
  labels:
    app: mariadb-kc
spec:
  serviceName: mariadb-kc
  replicas: 1
  selector:
    matchLabels:
      app: mariadb-kc
  template:
    metadata:
      labels:
        app: mariadb-kc
    spec:
      priorityClassName: db-priority
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mariadb
          image: dsegura97/mariadb-corp:1.0.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: db-root-password
            - name: MYSQL_DATABASE
              value: "keycloak"
            - name: MYSQL_USER
              value: "keycloak"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: db-password
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              add: [SETUID, SETGID, DAC_OVERRIDE]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: logs
              mountPath: /var/log/mysql
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - "mysqladmin ping -u root -p${MYSQL_ROOT_PASSWORD} --silent"
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - "mysql -u root -p${MYSQL_ROOT_PASSWORD} -e 'SELECT 1' --silent"
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2
            timeoutSeconds: 3
      volumes:
        - name: logs
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb-kc
  namespace: auth
spec:
  selector:
    app: mariadb-kc
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None
---
# ── OpenLDAP — Deployment (LDAP puro, sustituye a FreeIPA) ──
# Ver docs/ARCHITECTURE.md para justificar la migracion FreeIPA -> OpenLDAP.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openldap
  namespace: auth
  labels:
    app: openldap
spec:
  replicas: 1
  strategy:
    type: Recreate  # MDB backend no admite 2 escritores simultaneos
  selector:
    matchLabels:
      app: openldap
  template:
    metadata:
      labels:
        app: openldap
    spec:
      priorityClassName: db-priority
      securityContext:
        fsGroup: 911
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: openldap
          image: dsegura97/openldap-corp:1.0.0
          args: ["--copy-service"]
          env:
            - name: LDAP_ORGANISATION
              value: "PassProtect Corp"
            - name: LDAP_DOMAIN
              value: "corp.local"
            - name: LDAP_BASE_DN
              value: "dc=corp,dc=local"
            - name: LDAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openldap-secrets
                  key: admin-password
            - name: LDAP_CONFIG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openldap-secrets
                  key: config-password
            - name: LDAP_TLS
              value: "true"
            - name: LDAP_TLS_VERIFY_CLIENT
              value: "never"
            - name: LDAP_BACKEND
              value: "mdb"
          ports:
            - name: ldap
              containerPort: 389
            - name: ldaps
              containerPort: 636
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              add: [CHOWN, DAC_OVERRIDE, NET_BIND_SERVICE]
          livenessProbe:
            tcpSocket:
              port: 389
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "ldapsearch -x -H ldap://localhost:389 -b dc=corp,dc=local -s base '(objectclass=*)' > /dev/null"
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/ldap
            - name: config
              mountPath: /etc/ldap/slapd.d
            - name: certs
              mountPath: /container/service/slapd/assets/certs
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openldap-data
        - name: config
          persistentVolumeClaim:
            claimName: openldap-config
        - name: certs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: openldap
  namespace: auth
spec:
  type: ClusterIP
  selector:
    app: openldap
  ports:
    - name: ldap
      port: 389
      targetPort: 389
    - name: ldaps
      port: 636
      targetPort: 636
