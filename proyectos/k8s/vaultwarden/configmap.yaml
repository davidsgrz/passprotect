apiVersion: v1
kind: ConfigMap
metadata:
  name: vaultwarden-config
  namespace: vaultwarden
data:
  DOMAIN: "https://vault.TU_IP_VPS.nip.io"
  SIGNUPS_ALLOWED: "false"
  INVITATIONS_ALLOWED: "true"
  SHOW_PASSWORD_HINT: "false"
  SSO_ENABLED: "true"
  SSO_CLIENT_ID: "vaultwarden"
  SSO_AUTHORITY: "https://auth.TU_IP_VPS.nip.io/realms/corporativo"
  EXTENDED_LOGGING: "true"
  LOG_LEVEL: "info"
  ROCKET_PORT: "80"
  DB_VW_NAME: "vaultwarden"
  DB_VW_USER: "vaultwarden"
