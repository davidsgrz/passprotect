apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: vaultwarden
  labels:
    app: vaultwarden
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      labels:
        app: vaultwarden
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vaultwarden
          image: dsegura97/vaultwarden-corp:1.0.0
          ports:
            - containerPort: 80
              name: http
            - containerPort: 3012
              name: websocket
          envFrom:
            - configMapRef:
                name: vaultwarden-config
          env:
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: admin-token
            - name: DATABASE_URL
              value: "mysql://$(DB_VW_USER):$(DB_VW_PASSWORD)@mariadb-vw:3306/$(DB_VW_NAME)"
            - name: DB_VW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: db-password
            - name: SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: sso-client-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /root/logs
          livenessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultwarden-data
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  selector:
    app: vaultwarden
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: websocket
      port: 3012
      targetPort: 3012
---
# MariaDB para Vaultwarden
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb-vw
  namespace: vaultwarden
  labels:
    app: mariadb-vw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb-vw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mariadb-vw
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mariadb
          image: dsegura97/mariadb-corp:1.0.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: db-root-password
            - name: MYSQL_DATABASE
              value: "vaultwarden"
            - name: MYSQL_USER
              value: "vaultwarden"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: db-password
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              add: [SETUID, SETGID, DAC_OVERRIDE]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: logs
              mountPath: /var/log/mysql
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mariadb-vw
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb-vw
  namespace: vaultwarden
spec:
  selector:
    app: mariadb-vw
  ports:
    - port: 3306
      targetPort: 3306
