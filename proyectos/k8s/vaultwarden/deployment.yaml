# ── Vaultwarden — 1 replica (sin estado, right-sized para VPS 4GB) ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vaultwarden
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: vaultwarden
    spec:
      priorityClassName: high-priority
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vaultwarden
          image: dsegura97/vaultwarden-corp:1.0.0
          ports:
            - containerPort: 80
              name: http
            - containerPort: 3012
              name: websocket
          envFrom:
            - configMapRef:
                name: vaultwarden-config
          env:
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: admin-token
            - name: DATABASE_URL
              value: "postgresql://$(DB_VW_USER):$(DB_VW_PASSWORD)@postgres-vw:5432/$(DB_VW_NAME)"
            - name: DB_VW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: db-password
            - name: SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: sso-client-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /root/logs
          livenessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 2
            timeoutSeconds: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultwarden-data
        - name: tmp
          emptyDir:
            sizeLimit: 50Mi
        - name: logs
          emptyDir:
            sizeLimit: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  selector:
    app: vaultwarden
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: websocket
      port: 3012
      targetPort: 3012
---
# ── PostgreSQL Vaultwarden — StatefulSet (sustituye a mariadb-vw) ──
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-vw
  namespace: vaultwarden
  labels:
    app: postgres-vw
spec:
  serviceName: postgres-vw
  replicas: 1
  selector:
    matchLabels:
      app: postgres-vw
  template:
    metadata:
      labels:
        app: postgres-vw
    spec:
      priorityClassName: db-priority
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: dsegura97/postgres-corp:1.0.0
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "vaultwarden"
            - name: POSTGRES_USER
              value: "vaultwarden"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "vaultwarden", "-d", "vaultwarden"]
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "vaultwarden", "-d", "vaultwarden"]
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 2
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-vw
  namespace: vaultwarden
spec:
  selector:
    app: postgres-vw
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
