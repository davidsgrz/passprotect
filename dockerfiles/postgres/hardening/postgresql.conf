# ============================================================
# PassProtect — PostgreSQL 16 Hardening
# Tuned para VPS Contabo 4GB con 2 instancias (keycloak + vaultwarden)
# ============================================================

# ── Listener ──
listen_addresses = '*'
port = 5432

# ── Recursos (conservador, 2 postgres en 4GB VPS) ──
# max_connections=40: KC abre <20 (pool) y VW <10. Default 100 explota la RAM
# shared_buffers=96MB: ~25% del limit del pod (512Mi). Regla pgtune
# work_mem=4MB: peque por max_connections alto = 40 x 4 = 160MB peor caso
max_connections = 40
shared_buffers = 96MB
effective_cache_size = 256MB
work_mem = 4MB
maintenance_work_mem = 24MB
max_wal_size = 256MB
min_wal_size = 64MB

# ── Logging (minimo, suficiente para auditoria) ──
# stderr + collector=off: los logs salen por stderr y los recoge K8s (kubectl logs)
# en lugar de escribirlos a fichero dentro del container. Asi no inflan el PVC
# log_min_duration_statement=1000: solo loguea queries que tarden >1s (slow log)
# log_connections/disconnections: registra cada login/logout para auditoria
# log_line_prefix: formato '%t [pid] %u@%d ' (timestamp, pid, usuario@db)
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 1000
log_connections = on
log_disconnections = on
log_line_prefix = '%t [%p] %q%u@%d '
log_timezone = 'UTC'

# ── Autenticacion ──
password_encryption = scram-sha-256

# ── Performance (SSD razonable) ──
# random_page_cost=1.1: el default 4.0 asume HDD. En SSD el random ~= sequential
random_page_cost = 1.1
effective_io_concurrency = 200

# ── Seguridad ──
# Evita leakage por errores detallados a clientes no autenticados
log_error_verbosity = default
