server {
    listen 3000;
    server_name _;
    root /var/www/dashboard;
    index index.html;

    server_tokens off;

    # Resolver de CoreDNS (Kubernetes) para resolución dinámica de upstreams
    resolver 10.152.183.10 valid=30s ipv6=off;
    resolver_timeout 5s;

    # Upstreams como variables: fuerza resolución en runtime, no al arrancar
    set $vw_upstream "vaultwarden.vaultwarden.svc.cluster.local";
    set $kc_upstream "keycloak.auth.svc.cluster.local";

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls a Vaultwarden (namespace vaultwarden)
    location /api/ {
        proxy_pass http://$vw_upstream:80$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy a Keycloak para info de usuarios (namespace auth)
    location /auth/ {
        proxy_pass http://$kc_upstream:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
