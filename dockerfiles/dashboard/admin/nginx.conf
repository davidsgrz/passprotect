server {
    listen 3000;
    server_name _;
    root /var/www/dashboard;
    index index.html;

    server_tokens off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls a Vaultwarden
    location /api/ {
        proxy_pass http://vaultwarden:80/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy a Keycloak para info de usuarios
    location /auth/ {
        proxy_pass http://keycloak:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
