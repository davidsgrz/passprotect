server {
    # 3000: puerto unprivileged (no <1024). El upstream del helm es dashboard:3000
    listen 3000;
    server_name _;
    root /var/www/dashboard;
    index index.html;

    # Oculta el header "Server: nginx/x.y.z" -> menos info para fingerprinting
    server_tokens off;

    location / {
        # SPA fallback: cualquier ruta no encontrada en disco -> index.html
        # (necesario para SPAs con routing client-side)
        try_files $uri $uri/ /index.html;
    }
}
