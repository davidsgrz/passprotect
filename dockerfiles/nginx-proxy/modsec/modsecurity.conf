# ModSecurity configuration — proteccion contra SQLi, XSS, RCE, LFI
SecRuleEngine On
SecRequestBodyAccess On
SecRequestBodyLimit 134217728
SecRequestBodyNoFilesLimit 131072
SecResponseBodyAccess Off

# Audit log — registra solo eventos relevantes (no 404)
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsec_audit.log

# Cargar OWASP Core Rule Set (reglas anti SQLi, XSS, RCE, LFI, etc.)
Include /usr/share/modsecurity-crs/crs-setup.conf
Include /usr/share/modsecurity-crs/rules/*.conf

# Whitelist para Vaultwarden (evitar falsos positivos en API)
SecRule REQUEST_URI "@beginsWith /api/" \
    "id:1001,phase:1,pass,nolog,\
    ctl:ruleRemoveById=920273,\
    ctl:ruleRemoveById=942100"
